{% load static %}
<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>500 - Lỗi máy chủ | EduResource</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .error-card {
        background: white;
        border-radius: 20px;
        padding: 3rem;
        max-width: 500px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      }
      .error-code {
        font-size: 6rem;
        font-weight: 700;
        color: #e74c3c;
        line-height: 1;
        margin-bottom: 0.5rem;
      }
      .error-icon {
        font-size: 3rem;
        color: #e74c3c;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="error-card">
      <div class="error-icon">
        <i class="fas fa-exclamation-triangle"></i>
      </div>
      <div class="error-code">500</div>
      <h2 class="fw-bold mb-3">Lỗi máy chủ</h2>
      <p class="text-muted mb-4">
        Đã xảy ra lỗi không mong muốn. Vui lòng thử lại sau hoặc liên hệ quản trị viên.
      </p>
      <div class="d-flex justify-content-center gap-3">
        <a href="/" class="btn btn-danger px-4">
          <i class="fas fa-home me-2"></i>Trang chủ
        </a>
        <button onclick="location.reload()" class="btn btn-outline-danger px-4">
          <i class="fas fa-redo me-2"></i>Thử lại
        </button>
      </div>
    </div>
  </body>
</html>
